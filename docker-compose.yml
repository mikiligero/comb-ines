services:
  comb-ines:
    image: ghcr.io/mikiligero/comb-ines:latest
    container_name: comb-ines
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/tmp/dev.db
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      - ./prisma/dev.db:/tmp/dev.db
      - ./public/uploads:/app/public/uploads
